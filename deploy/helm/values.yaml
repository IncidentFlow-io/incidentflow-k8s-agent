replicaCount: 1

image:
  repository: ghcr.io/incidentflow-io/incidentflow-platform/incidentflow-k8s-agent
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

platformUrl: "https://api.incidentflow.io"
gatewayUrl: "wss://gateway.incidentflow.io/agents/ws"
clusterName: ""
logLevel: info

registrationToken: ""
agentToken: ""

namespaceAllowlist: []

limits:
  defaultTailLines: 200
  maxTailLines: 1000
  maxLogBytes: 524288
  commandTimeout: 30s
  heartbeatPeriod: 30s

persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""
  accessModes:
    - ReadWriteOnce

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

observability:
  tracingEnabled: "false"
  otlpEndpoint: "otel-collector.observability.svc.cluster.local:4317"
  environment: "production"

nodeSelector: {}
tolerations: []
affinity: {}
