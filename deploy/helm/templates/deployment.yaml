apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "incidentflow-k8s-agent.fullname" . }}
  labels:
    {{- include "incidentflow-k8s-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "incidentflow-k8s-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "incidentflow-k8s-agent.selectorLabels" . | nindent 8 }}
      {{- if and .Values.metrics.enabled (not .Values.metrics.serviceMonitor.enabled) }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      serviceAccountName: {{ include "incidentflow-k8s-agent.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "incidentflow-k8s-agent.configmapName" . }}
          env:
            - name: INCIDENTFLOW_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "incidentflow-k8s-agent.secretName" . }}
                  key: registration-token
                  optional: true
            - name: INCIDENTFLOW_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "incidentflow-k8s-agent.secretName" . }}
                  key: agent-token
                  optional: true
            - name: K8S_NAMESPACE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.metrics.enabled }}
            - name: INCIDENTFLOW_METRICS_ADDR
              value: ":{{ .Values.metrics.port }}"
            {{- else }}
            - name: INCIDENTFLOW_METRICS_ADDR
              value: ""
            {{- end }}
            {{- if .Values.observability.tracing.enabled }}
            - name: OBSERVABILITY_TRACING_ENABLED
              value: "true"
            {{- if .Values.observability.tracing.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.tracing.otlpEndpoint | quote }}
            {{- end }}
            - name: SERVICE_VERSION
              value: {{ .Values.image.tag | default .Chart.AppVersion | quote }}
            - name: ENV
              value: {{ .Values.observability.environment | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: token-store
              mountPath: /var/lib/incidentflow
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      volumes:
        - name: token-store
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "incidentflow-k8s-agent.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
