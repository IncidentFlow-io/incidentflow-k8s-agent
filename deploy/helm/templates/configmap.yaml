apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "incidentflow-k8s-agent.fullname" . }}
  labels:
    {{- include "incidentflow-k8s-agent.labels" . | nindent 4 }}
data:
  platform-url: {{ .Values.platformUrl | quote }}
  gateway-url: {{ .Values.gatewayUrl | quote }}
  cluster-name: {{ default .Release.Name .Values.clusterName | quote }}
  log-level: {{ .Values.logLevel | quote }}
  namespace-allowlist: {{ join "," .Values.namespaceAllowlist | quote }}
  default-tail-lines: {{ .Values.limits.defaultTailLines | quote }}
  max-tail-lines: {{ .Values.limits.maxTailLines | quote }}
  max-log-bytes: {{ .Values.limits.maxLogBytes | quote }}
  command-timeout: {{ .Values.limits.commandTimeout | quote }}
  heartbeat-period: {{ .Values.limits.heartbeatPeriod | quote }}
