name: helm-release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write  # cosign keyless signing

env:
  CHART_REGISTRY: oci://ghcr.io/incidentflow-io/charts
  CHART_NAME: incidentflow-k8s-agent

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  release:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Package Helm chart
        run: |
          helm package deploy/helm/ \
            --version "${{ needs.prepare.outputs.version }}" \
            --app-version "v${{ needs.prepare.outputs.version }}"

      - name: Push Helm chart to OCI registry
        id: helm-push
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          PUSH_OUTPUT=$(helm push "${CHART_NAME}-${VERSION}.tgz" "${CHART_REGISTRY}" 2>&1)
          echo "$PUSH_OUTPUT"
          CHART_DIGEST=$(echo "$PUSH_OUTPUT" | grep "^Digest:" | awk '{print $2}')
          if [[ -z "$CHART_DIGEST" ]]; then
            echo "ERROR: could not parse chart digest from helm push output" >&2
            exit 1
          fi
          echo "digest=${CHART_DIGEST}" >> "$GITHUB_OUTPUT"
        env:
          CHART_NAME: ${{ env.CHART_NAME }}
          CHART_REGISTRY: ${{ env.CHART_REGISTRY }}

      - uses: sigstore/cosign-installer@v3

      - name: Sign Helm chart (keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/incidentflow-io/charts/${{ env.CHART_NAME }}@${{ steps.helm-push.outputs.digest }}"
