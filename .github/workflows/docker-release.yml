name: docker-release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write  # cosign keyless signing

env:
  IMAGE: ghcr.io/incidentflow-io/incidentflow-k8s-agent

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set platform env
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ github.sha }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true,name=${{ env.IMAGE }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Create and push multi-arch manifest
        id: push
        working-directory: ${{ runner.temp }}/digests
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          SOURCES=$(printf '${{ env.IMAGE }}@sha256:%s ' *)
          docker buildx imagetools create \
            -t "${{ env.IMAGE }}:${VERSION}" \
            -t "${{ env.IMAGE }}:latest" \
            $SOURCES
          DIGEST=$(docker buildx imagetools inspect "${{ env.IMAGE }}:${VERSION}" \
            --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3

      - name: Sign Docker image (keyless)
        run: |
          cosign sign --yes "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}"

  update-infra:
    runs-on: ubuntu-latest
    needs: [prepare, merge]
    permissions:
      contents: read
    steps:
      - name: Check infrastructure token
        env:
          INFRA_GITHUB_TOKEN: ${{ secrets.INFRA_GITHUB_TOKEN }}
        run: |
          if [ -z "$INFRA_GITHUB_TOKEN" ]; then
            echo "INFRA_GITHUB_TOKEN secret is missing or empty. Add a PAT with contents:write access to IncidentFlow-io/infrastructure." >&2
            exit 1
          fi

      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: IncidentFlow-io/infrastructure
          token: ${{ secrets.INFRA_GITHUB_TOKEN }}

      - name: Install yq
        run: |
          YQ_VERSION="v4.44.3"
          wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - name: Update Helm values image tag
        run: |
          set -euo pipefail

          version="${{ needs.prepare.outputs.version }}"

          export version
          yq -i '.image.tag = strenv(version)' helm/incidentflow-k8s-agent/values-prod.yaml

          git config user.email "ci-bot@incidentflow.io"
          git config user.name "CI Bot"
          git add helm/incidentflow-k8s-agent/values-prod.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit. Tag already matches current value."
            exit 0
          fi

          git commit -m "chore(incidentflow-k8s-agent): update prod image tag to ${version} [skip ci]"
          git push
